; ============================================================================
;  max-map-editor - SHIPPED DEFAULT SETTINGS
; ============================================================================
;
;  This file holds the default settings the editor ships with. It is read-only
;  in spirit: edits here are NOT guaranteed to survive an update, and the editor
;  never writes to it.
;
;  To customize, the editor saves your changes to
;
;       resources/user/config/mme.ini
;
;  which is layered ON TOP of this file - any key you set there wins, everything
;  else falls back to the defaults below. You may also hand-edit that user file
;  to override any setting here (create it if it does not exist; only include the
;  keys you want to change).
;
;  Conventions:
;    - Lines starting with ';' are comments.
;    - Section names and keys are CamelCase (e.g. [Workspace] UiScale=1.25,
;      [Bindings] ZoomTo100=1). [Bindings] keys are PascalCase action names; a
;      raw command line (e.g. "tool eraser") also works as a key.
; ----------------------------------------------------------------------------

[Bindings]
; Map an action (the key, PascalCase) to one or more key chords (the value,
; space-separated). An empty value unbinds the action.
;   Undo=Ctrl+Z        ZoomTo100=1        ConsoleToggle=Backquote F1
; File
SaveProject=Ctrl+S
FileDialogSaveAs=Ctrl+Shift+S
FileDialogLoad=Ctrl+O
NewMap=Ctrl+N
CloseProject=Ctrl+W
Export=Ctrl+E
; Edit
Undo=Ctrl+Z
Redo=Ctrl+Shift+Z Ctrl+Y
Cut=Ctrl+X
Copy=Ctrl+C
Paste=Ctrl+V
Delete=Delete
DeleteAll=Shift+Delete
; Select
SelectAll=Ctrl+A
SelectClear=Ctrl+D
SelectInvert=Ctrl+I
; Pass Table Editor - digits pick the active pass value
PassPick0=0
PassPick1=1
PassPick2=2
PassPick3=3
; View - in the map editor the digits double as zoom presets
Fit=F
ZoomTo100=1
ZoomTo50=2
ZoomTo25=3
ZoomIn=Plus Shift+Plus Equals
ZoomOut=Minus
GridToggle=G
PassOverlayToggle=O
UnitsToggle=U
; Tools
ToolPencil=B
ToolEraser=E
ToolPicker=I
ToolFill=K
ToolSelect=L
ToolSelectRect=M
; Misc
AnimateToggle=A
ConsoleToggle=Backquote F1
Quit=Escape

[Mouse]
; PaintButton / PanButtons: Left, Middle, Right (PanButtons may list several).
PaintButton=Left
PanButtons=Middle Right
; Wheel-zoom factor per notch (1.01 .. 2.0).
ZoomStep=1.15

[Paths]
; Your M.A.X. install directory - lets the editor load unit sprites. Leave empty
; if you don't have it.
MaxPath=

[Workspace]
; Auto-managed UI layout: dock sizes (Docks = left right top bottom) and per-panel
; placement (Place X Y W H Extent). The editor rewrites these as you move/resize
; panels, so you normally don't hand-edit them.
; UiScale: overall UI + font scale - 1 (small) / 1.25 (medium) / 1.5 (large).
; TilesPreview / TemplatesPreview: the explorer thumbnail size (px) chosen from
; each panel's size dropdown - Tiles is one of 16/24/32/48/64/128/256, Templates
; one of 32/48/64/96/128.
Docks=189 319 130 150
Minimap=Left 0 0 260 220 234
Palette=Left 0 0 300 220 220
Templates=Right 0 0 300 320 320
TemplatesPreview=96
Tiles=Right 0 0 300 320 320
TilesPreview=48
Toolbox=Bottom 0 0 360 160 360
UiScale=1
Units=Hidden 0 0 300 320 320
WrlPalette=Hidden 0 0 300 220 220
