# Release: portable zips for Linux + Windows.
#
# Triggered by a v*.*.* tag (or manually, which builds the zips as artifacts
# without creating a release). Only first-party actions + the preinstalled
# `gh` CLI are used - no third-party actions (supply-chain policy).
#
# Zip layout (the portable install - settings live beside the binary):
#   max-map-editor[.exe]
#   resources/...   (tile packs, maps, manual, and config/mme.ini)
#   MANUAL.md, LICENSE, THIRD-PARTY-LICENSES.md
#   install.sh (Linux only - optional desktop integration)

name: release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*.*.*"

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04 # oldest LTS runner -> widest glibc compatibility
            target: linux-x86_64
          - os: windows-latest
            target: windows-x86_64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Check tag matches workspace version
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          version=$(sed -n 's/^version *= *"\(.*\)"/\1/p' Cargo.toml | head -1)
          tag="${GITHUB_REF_NAME#v}"
          if [ "$version" != "$tag" ]; then
            echo "::error::tag v$tag does not match Cargo.toml version $version"
            exit 1
          fi

      - name: Install build deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwayland-dev libxkbcommon-dev libx11-dev \
            libxcursor-dev libxrandr-dev libxi-dev \
            mesa-vulkan-drivers

      - name: Build
        run: cargo build --release --locked -p max-map-editor

      - name: Stage portable directory
        shell: bash
        run: |
          version=$(sed -n 's/^version *= *"\(.*\)"/\1/p' Cargo.toml | head -1)
          name="max-map-editor-v$version-${{ matrix.target }}"
          echo "ZIP_NAME=$name" >> "$GITHUB_ENV"
          mkdir -p "dist/$name"
          if [ "${{ runner.os }}" = "Windows" ]; then
            cp target/release/max-map-editor.exe "dist/$name/"
          else
            cp target/release/max-map-editor "dist/$name/"
            cp install.sh "dist/$name/"
          fi
          cp -R resources "dist/$name/"
          cp MANUAL.md LICENSE THIRD-PARTY-LICENSES.md "dist/$name/"

      - name: Smoke test (Linux, software Vulkan)
        if: runner.os == 'Linux'
        continue-on-error: true # no-GPU runners are best-effort here
        run: |
          printf 'quit!\n' > /tmp/smoke.script
          cd "dist/$ZIP_NAME"
          ./max-map-editor --headless --script /tmp/smoke.script

      - name: Zip (Linux)
        if: runner.os == 'Linux'
        run: cd dist && zip -qr "$ZIP_NAME.zip" "$ZIP_NAME"

      - name: Zip (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path "dist/$env:ZIP_NAME" -DestinationPath "dist/$env:ZIP_NAME.zip"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ZIP_NAME }}
          path: dist/${{ env.ZIP_NAME }}.zip
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$GITHUB_REF_NAME" --draft --verify-tag \
            --title "$GITHUB_REF_NAME" \
            --notes "Draft - release notes are written by hand before publishing." \
            dist/*.zip
